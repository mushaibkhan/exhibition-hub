services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: exhibition_hub
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword123}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U app_user -d exhibition_hub" ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://app_user:${DB_PASSWORD:-devpassword123}@postgres:5432/exhibition_hub
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      PORT: 4000
      NODE_ENV: development
    ports:
      - "4000:4000"

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: https://api.hub.hydeduexpo.com/api
    ports:
      - "5173:5173"

    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
